name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        if: matrix.os == 'ubuntu-latest'
        run: |
          uv run ruff check src/ tests/
          uv run ruff format --check src/ tests/

      - name: Type check (mypy strict)
        if: matrix.os == 'ubuntu-latest'
        run: uv run mypy src/

      - name: Tests (pytest)
        run: uv run pytest -q

      - name: Build distribution
        run: uv build

      - name: Smoke test wheel
        shell: bash
        run: |
          uv venv smoke-venv
          uv pip install --python smoke-venv dist/*.whl
          if [ -x smoke-venv/bin/anaplan-audit ]; then
            smoke-venv/bin/anaplan-audit version
          else
            smoke-venv/Scripts/anaplan-audit.exe version
          fi
